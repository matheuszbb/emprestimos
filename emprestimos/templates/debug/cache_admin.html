<!-- templates/debug/cache_admin.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cache Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid #3498db;
        }
        .stat-label { 
            font-size: 13px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50;
        }
        .actions {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 10px;
            transition: background 0.2s;
        }
        button:hover { background: #c0392b; }
        button.secondary { background: #95a5a6; }
        button.secondary:hover { background: #7f8c8d; }
        .user-info {
            text-align: right;
            color: #7f8c8d;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Static Cache Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Entradas em Cache</div>
                <div class="stat-value">{{ stats.cache_entries }}</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Uso de Memória</div>
                <div class="stat-value">{{ stats.memory_usage_mb }} MB</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Taxa de Acerto</div>
                <div class="stat-value">{{ stats.hit_rate_percent }}%</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Requisições Totais</div>
                <div class="stat-value">{{ stats.total_requests }}</div>
            </div>
        </div>
        
        <div class="actions">
            <h2 style="margin-bottom: 15px; color: #2c3e50;">Ações Administrativas</h2>
            <button onclick="clearCache()">🗑️ Limpar Cache</button>
            <button class="secondary" onclick="resetStats()">🔄 Resetar Estatísticas</button>
        </div>
        
        <div class="user-info">
            Logado como: <strong>{{ user.username }}</strong>
        </div>
    </div>
    
    <script>
        async function clearCache() {
            if (!confirm('Tem certeza que deseja limpar o cache?')) return;
            
            const response = await fetch(window.location.href, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'clear_cache'})
            });
            
            const result = await response.json();
            alert(result.success ? 'Cache limpo!' : 'Erro: ' + result.error);
            location.reload();
        }
        
        async function resetStats() {
            if (!confirm('Resetar estatísticas?')) return;
            
            const response = await fetch(window.location.href, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'reset_stats'})
            });
            
            const result = await response.json();
            alert(result.success ? 'Stats resetadas!' : 'Erro: ' + result.error);
            location.reload();
        }
    </script>
</body>
</html>
